<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileSync</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f6ef7">
  <meta name="description" content="Peer-to-peer file sharing directly in your browser. No server, no account, no limits.">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" integrity="sha384-9Y7JNlBk3S6lW6uj0tRHCx1b4bNwPNlFwHXTve3aAgF7n/4FC7wFclGouAUkQD2" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-oA1wAqLBiOGSXQcP6PpeEoRsczzhASLIqf5LjNW9ceKDMq4/2eIobRxiK5Tqv1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div id="app">
    <div id="screen-home" class="screen active">
      <div class="card">
        <button class="theme-toggle" id="theme-toggle-home" title="Toggle dark mode">&#9790;</button>
        <h1>FileSync</h1>
        <p>Share files directly between browsers.<br>No server, no account, no upload limit.</p>
        <button class="btn btn-primary btn-block" id="btn-create">Create Room</button>
        <div class="divider"><span>or</span></div>
        <div class="join-form">
          <input type="text" id="input-room-code" placeholder="Enter room code (e.g. blue-tiger-42)" autocomplete="off" />
          <button class="btn btn-primary" id="btn-join">Join</button>
        </div>
        <p style="margin-top:16px;font-size:0.8rem;color:var(--text-secondary);">
          Files stay in your browser &mdash; nothing is stored on a server.
        </p>
      </div>
    </div>

    <div id="screen-room" class="screen">
      <div class="room-header">
        <div class="room-code">
          <span id="room-code-display"></span>
          <button class="btn btn-secondary" id="btn-copy-code" style="padding:4px 10px;font-size:0.8rem;">Copy</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span id="peer-count" class="peer-count">Waiting for peers...</span>
          <button class="theme-toggle" id="theme-toggle-room" title="Toggle dark mode" style="position:static;">&#9790;</button>
          <div class="status" id="connection-status">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Initializing...</span>
          </div>
        </div>
      </div>

      <div class="upload-zone" id="upload-zone">
        <p>Drop files here or <a id="btn-browse">browse</a></p>
        <input type="file" id="file-input" multiple hidden />
      </div>

      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">&#128270;</span>
          <input type="text" id="search-input" placeholder="Search files..." autocomplete="off" />
        </div>
        <button class="btn btn-secondary btn-sm" id="btn-select-all">Select All</button>
      </div>

      <div id="file-list-container">
        <div id="empty-state">
          <div class="icon">&#128229;</div>
          <p>No files yet. Upload something!</p>
        </div>
        <div class="file-list" id="file-list"></div>
      </div>

      <div id="batch-bar" class="batch-bar">
        <span id="batch-count">0 selected</span>
        <div class="batch-actions">
          <button class="btn btn-success btn-sm" id="btn-batch-download">Download ZIP</button>
          <button class="btn btn-danger btn-sm" id="btn-batch-delete">Delete</button>
        </div>
      </div>

      <div id="queue-info" class="queue-info" style="display:none;">
        <span>&#128337;</span>
        <span id="queue-count"></span>
      </div>

      <div class="room-actions" style="margin-top:16px;">
        <button class="btn btn-success" id="btn-download-all">Download All as ZIP</button>
        <button class="btn btn-secondary" id="btn-leave">Leave</button>
      </div>
    </div>
  </div>

  <div id="preview-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Preview</span>
        <button class="btn btn-secondary btn-sm" id="preview-close">Close</button>
      </div>
      <div class="modal-body" id="preview-content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
